<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Trainer Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { text-align: center; font-size: 2.5rem; margin: 20px 0; }
        .tabs { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .tab {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .tab.active { background: white; color: #667eea; }
        .content {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            min-height: 300px;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .stat-value { font-size: 2rem; font-weight: bold; margin-bottom: 5px; }
        .stat-label { font-size: 0.85rem; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <h1>💪 Fitness Trainer</h1>
        <div class="tabs">
            <button class="tab active" onclick="showTab('home')">🏠 Главная</button>
            <button class="tab" onclick="showTab('workouts')">💪 Тренировки</button>
            <button class="tab" onclick="showTab('nutrition')">🥗 Питание</button>
            <button class="tab" onclick="showTab('analytics')">📊 Аналитика</button>
            <button class="tab" onclick="showTab('ai')">🤖 AI Коуч</button>
        </div>
        <div class="content" id="content">
            <h2>🏠 Главная</h2>
            <div class="stat-grid">
                <div class="stat-card">
                    <div class="stat-value" style="color: #00f7ff">72.5</div>
                    <div class="stat-label">Вес (кг)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: #ff6b35">12</div>
                    <div class="stat-label">Тренировок</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: #10b981">85%</div>
                    <div class="stat-label">Цель</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showTab(tab) {
            // Update active tab
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            // Update content
            const content = document.getElementById('content');
            const titles = {
                'home': '🏠 Главная',
                'workouts': '💪 Тренировки',
                'nutrition': '🥗 Питание',
                'analytics': '📊 Аналитика',
                'ai': '🤖 AI Коуч'
            };
            content.innerHTML = `<h2>${titles[tab]}</h2><p>Добро пожаловать в твой фитнес-трекер!</p>`;
        }
    </script>
</body>
</html>
